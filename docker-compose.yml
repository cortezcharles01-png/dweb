version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: student_savings
      DB_USER: root
      DB_PASS: rootpassword

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: student_savings
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
